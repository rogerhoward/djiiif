# Read the Docs configuration for djiiif.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_checkout:
      # Read the Docs does a shallow clone without tags; fetch the full history
      # and tags so setuptools-scm can derive the real version from the git tag
      # (otherwise the version falls back to 0.1.dev and the docs mislabel it).
      - git fetch --unshallow || true
      - git fetch --tags || true

sphinx:
  configuration: docs/source/conf.py
  # Treat warnings as errors so broken references / stale autodoc fail the build.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
